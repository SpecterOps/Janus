interface:
  display_name: "Janus Report Interpreter"
  short_description: "Interpret Janus findings and report limits"
  default_prompt: "Use $janus-report-interpreter to summarize this Janus bundle or report into evidence-based findings and recommendations. Infer likely engagement context first (development, training, operation, mixed, or unclear) with confidence and explain how that context should shape interpretation."

policy:
  allow_implicit_invocation: true
